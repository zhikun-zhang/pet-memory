<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 土豆拾光 - 页面未找到</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 400px;
        }
        
        .cat-icon {
            font-size: 100px;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .title {
            font-size: 36px;
            color: #5a3e36;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .subtitle {
            font-size: 16px;
            color: #a08060;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #5a3e36;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.4);
        }
        
        .footer {
            position: absolute;
            bottom: 20px;
            color: #a08060;
            font-size: 12px;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #f0e0d0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .search-box input:focus {
            border-color: #ff9a9e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cat-icon">😿</div>
        <h1 class="title">404</h1>
        <p class="subtitle">哎呀，页面走丢了！<br>毛孩子找不到回家的路了...</p>
        
        <div class="search-box">
            <input type="text" placeholder="搜索你想找的内容..." onkeyup="handleSearch(event)">
        </div>
        
        <a href="主应用.html" class="btn">🏠 返回首页</a>
    </div>
    
    <div class="footer">🐾 土豆拾光 - 记录每一个温暖的瞬间</div>
    
    <script>
        function handleSearch(e) {
            if (e.key === 'Enter') {
                window.location.href = '主应用.html';
            }
        }
    </script>
</body>
</html>
